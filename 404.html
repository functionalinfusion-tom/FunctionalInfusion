<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="SAMEORIGIN">
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">

  <title>Page Not Found | Functional Infusion</title>
  <meta name="description" content="The page you're looking for doesn't exist. Return to Functional Infusion to explore our co-packing services.">
  <meta name="robots" content="noindex, follow">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/404.css">
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
</head>

<body>
<a class="skip-link" href="#main-content">Skip to main content</a>

<main id="main-content">
  <div class="page-404">

    <!-- Ghosted 404 number behind content -->
    <div class="ghost-404" aria-hidden="true">404</div>

    <!-- Centered card -->
    <div class="error-content">

      <div class="error-logo">
        <img src="fulllogo_animated.gif"
             alt="Functional Infusion"
             width="80" height="32"
             loading="eager">
      </div>

      <h1>Lost in the formula.</h1>

      <p>
        This page doesn't exist, but your perfect product can.
        Let's get you back on track.
      </p>

      <div class="error-actions">
        <a class="btn btn-primary" href="index.html">Back to Home</a>
        <a class="btn btn-secondary" href="services.html">View Our Services</a>
      </div>

      <!-- Decorative leaf SVG -->
      <svg class="leaf-decoration" xmlns="http://www.w3.org/2000/svg"
           viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
           aria-hidden="true" focusable="false">
        <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10z"/>
        <path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/>
      </svg>

    </div>
  </div>
</main>

<script src="js/security.js" defer></script>
</body>
</html>
